services:
  app:
    build: .
    volumes:
      - ./account.enc:/app/account.enc:ro
      - ./ani_libs.bin:/app/ani_libs.bin:ro
      - ./devices:/app/devices
    env_file: .env
    ports:
      - "${PORT:-5000}:${PORT:-5000}"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:${PORT:-5000}/health"]
      interval: 30m
      timeout: 10s
      retries: 3
      start_period: 30s
      start_interval: 5s
